<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Depot Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Depot Dashboard</h1>
  <div class="dashboard">
    <div>
      <h2>Top 10 Gainers</h2>
      <table id="gainers">
        <thead>
          <tr><th>Ticker</th><th>Last Price</th><th>Change %</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div>
      <h2>Top 10 Losers</h2>
      <table id="losers">
        <thead>
          <tr><th>Ticker</th><th>Last Price</th><th>Change %</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script src="dashboard.js" defer></script>
</body>
</html>
